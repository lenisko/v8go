name: build-engine

# MANUAL: build a V8 engine for a chosen V8 version, publish per-platform libv8
# packages on a GitHub Release, and pin deps/v8_hash in the repo. Input may be a
# V8 commit hash, a Chrome major (e.g. 148), or "latest" (resolved via chromiumdash).
#
# Runners: ubuntu = x64 (linux/amd64 native, linux/arm64 cross — V8 ships only a
# linux-x64 rust toolchain); macos-latest = arm64 (darwin/arm64 native). darwin/amd64
# is not built. build.py uses its per-OS default toolchain (linux=gcc, darwin=clang):
# forcing clang on linux produces objects GNU ld rejects ("incompatible") when a
# consumer links with g++. Built against system libstdc++ (use_custom_libcxx=false) for
# cgo ABI compat, with use_allocator_shim=false (system libc++ on mac rejects PA's hidden
# operator new/delete), the V8 sandbox off (cgo.go drops -DV8_ENABLE_SANDBOX to match),
# and temporal off (drops the temporal_rs Rust dep that otherwise leaves dangling symbols).

on:
  workflow_dispatch:
    inputs:
      v8:
        description: 'V8 commit hash, or Chrome major (e.g. 148), or "latest"'
        required: true
        default: 'latest'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      v8_hash: ${{ steps.r.outputs.v8_hash }}
      tag: ${{ steps.r.outputs.tag }}
      chrome_version: ${{ steps.r.outputs.chrome_version }}
    steps:
      - uses: actions/checkout@v5
      - id: r
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/resolve-v8.py "${{ github.event.inputs.v8 }}"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: amd64, runner: ubuntu-latest }
          - { os: linux,  arch: arm64, runner: ubuntu-latest }
          - { os: darwin, arch: arm64, runner: macos-latest }
    runs-on: ${{ matrix.runner }}
    env:
      V8_HASH: ${{ needs.resolve.outputs.v8_hash }}
      ARCH: ${{ matrix.arch }}
      OSID: ${{ matrix.os }}
      PLATFORM: ${{ matrix.os }}_${{ matrix.arch }}
      TAG: ${{ needs.resolve.outputs.tag }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Free disk space (linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq --no-install-recommends build-essential python3 git curl ca-certificates ccache pkg-config ninja-build xz-utils
          if [ "$ARCH" = "arm64" ]; then
            sudo apt-get install -yq --no-install-recommends g++-aarch64-linux-gnu
          fi

      - name: Toolchain (macos)
        if: runner.os == 'macOS'
        run: brew install ccache ninja || true

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.resolve.outputs.v8_hash }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.arch }}-

      - name: depot_tools + V8 source @ pinned commit
        shell: bash
        run: |
          set -euo pipefail
          export GCLIENT_SUPPRESS_GIT_VERSION_WARNING=1
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git deps/depot_tools
          export PATH="$PWD/deps/depot_tools:$PATH"
          gclient --version >/dev/null 2>&1 || true
          mkdir -p deps/v8
          git -C deps/v8 init -q
          git -C deps/v8 remote add origin https://chromium.googlesource.com/v8/v8.git
          git -C deps/v8 fetch --depth=1 origin "$V8_HASH"
          git -C deps/v8 checkout -q FETCH_HEAD
          echo "$V8_HASH" > deps/v8_hash

      - name: Build V8 (${{ matrix.os }}/${{ matrix.arch }})
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PWD/deps/depot_tools:$PATH"
          export GCLIENT_SUPPRESS_GIT_VERSION_WARNING=1
          cd deps
          # No --clang: use build.py's per-OS default (linux=gcc, darwin=clang).
          # Forcing clang on linux yields objects GNU ld rejects as "incompatible"
          # when a consumer links with g++; gcc is upstream's proven linux config.
          python3 ./build.py --ccache --verbose --arch "$ARCH" --os "$OSID"
          # Regenerate deps/<platform>/cgo.go from the fresh libmanifest — a build may
          # emit a different lib count (e.g. 3 vs 2), and a stale cgo.go would link the
          # wrong -lv8-* set (missing-symbol / partial link). MUST run after build.py.
          python3 ./update_cgo.py
          # Regenerate deps/include from the built V8 source — MUST succeed (needs `go`),
          # else stale headers ship with new libs (header/lib ABI drift). No `|| true`.
          python3 ./build_common.py
          ls -la "$PLATFORM"/
          echo "built V8 headers:"
          grep -h "V8_MAJOR_VERSION\|V8_MINOR_VERSION\|V8_BUILD_NUMBER\|V8_PATCH_LEVEL" include/v8-version.h

      - name: Smoke test (cgo link + run JS) -- GATES the upload
        shell: bash
        run: |
          set -euo pipefail
          # A non-linking engine (e.g. dangling temporal_rs Rust symbols) must
          # FAIL here, before it can ever reach a Release. Links the freshly
          # built deps/$PLATFORM via the in-repo module; runs JS when the build
          # is native, link-only (cross-compile) otherwise.
          work="$RUNNER_TEMP/smoke"; mkdir -p "$work"
          cat > "$work/main.go" <<'GO'
          package main
          import ( "fmt"; v8 "github.com/lenisko/v8go" )
          func main() {
            iso := v8.NewIsolate(); defer iso.Dispose()
            ctx := v8.NewContext(iso); defer ctx.Close()
            v, err := ctx.RunScript("[1,2,3].map(x=>x*x).join(',')+'|'+typeof Temporal", "smoke.js")
            if err != nil { panic(err) }
            fmt.Println("smoke ok:", v)
          }
          GO
          {
            echo "module smoke"
            echo "go 1.21"
            echo "require github.com/lenisko/v8go v0.0.0"
            echo "replace github.com/lenisko/v8go => $GITHUB_WORKSPACE"
            for p in android_amd64 android_arm64 darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
              echo "require github.com/lenisko/v8go/deps/$p v0.0.0"
              echo "replace github.com/lenisko/v8go/deps/$p => $GITHUB_WORKSPACE/deps/$p"
            done
          } > "$work/go.mod"
          cd "$work"
          export GOFLAGS=-mod=mod CGO_ENABLED=1
          if [ "$OSID" = "$(go env GOHOSTOS)" ] && [ "$ARCH" = "$(go env GOHOSTARCH)" ]; then
            echo "native -> link + run"; go run .
          else
            # Cross-compile: link-only, NON-FATAL. The temporal_rs-class link failure is
            # gn-config-universal, so the native cells (darwin/arm64, linux/amd64) already
            # gate it; a cross-toolchain quirk here must not sink an otherwise-good engine.
            echo "cross ($OSID/$ARCH) -> link-only (non-fatal)"
            if [ "$OSID" = linux ] && [ "$ARCH" = arm64 ]; then export CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++; fi
            GOOS="$OSID" GOARCH="$ARCH" go build -o /dev/null . \
              || echo "::warning::cross smoke link failed for $OSID/$ARCH (non-fatal; native cells gate the engine)"
          fi

      - name: Package engine (libs + headers)
        shell: bash
        run: |
          set -euo pipefail
          out="libv8-${TAG}-${PLATFORM}.tar.gz"
          tar -czf "$out" -C deps "$PLATFORM" include
          shasum -a 256 "$out" || sha256sum "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}_${{ matrix.arch }}
          path: libv8-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
      V8_HASH: ${{ needs.resolve.outputs.v8_hash }}
      CVER: ${{ needs.resolve.outputs.chrome_version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage engine in-tree (Model A) + version guard
        shell: bash
        run: |
          set -euo pipefail
          # Extract each platform tarball into deps/ (-> deps/<platform>/*.a + deps/include).
          # This bakes the built libs into the repo so `go get <module>@<tag>` works with
          # NO download step. include is identical across platforms; last write wins.
          for tgz in $(find dist -name 'libv8-*.tar.gz'); do
            echo "extract $tgz"; tar -xzf "$tgz" -C deps
          done
          echo "$V8_HASH" > deps/v8_hash
          # Record the ACTUAL built V8 version from the headers (not a label) so a
          # mislabel is impossible: the commit + release carry the true version.
          ver=$(awk '/V8_MAJOR_VERSION/{a=$3}/V8_MINOR_VERSION/{b=$3}/V8_BUILD_NUMBER/{c=$3}/V8_PATCH_LEVEL/{d=$3}END{print a"."b"."c"."d}' deps/include/v8-version.h)
          echo "BUILT_V8=$ver" | tee -a "$GITHUB_ENV"
          [ -n "$ver" ] && [ "$ver" != "..." ] || { echo "::error::could not read built V8 version"; exit 1; }
          test -s deps/darwin_arm64/libv8-0.a   # sanity: libs actually present

      - name: Commit engine + pin deps pseudo-versions + tag + push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit 1 = the libs. This is the commit consumers' nested deps/* modules
          # resolve to, so it must contain deps/<platform>/*.a + go.mod.
          git add -A deps
          if git diff --cached --quiet; then
            echo "no lib change; reusing HEAD as the libs commit"
          else
            git commit -m "engine: V8 ${BUILT_V8} (${V8_HASH}) ${CVER} libs"
            git push
          fi
          C1=$(git rev-parse HEAD)

          # A consumer doing `go get github.com/lenisko/v8go@<tag>` IGNORES this repo's
          # `replace ./deps/*` directives (replace only applies in the main module), so
          # it resolves the deps/* modules by the versions in root go.mod's require block.
          # Pin those to the pseudo-version of C1 so they resolve to THIS repo's commit.
          TS=$(TZ=UTC git show -s --date=format-local:%Y%m%d%H%M%S --format=%cd "$C1")
          SH=$(git rev-parse --short=12 "$C1")
          PV="v0.0.0-${TS}-${SH}"
          echo "deps pseudo-version: $PV  (commit $C1)"
          for p in android_amd64 android_arm64 darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            go mod edit -require="github.com/lenisko/v8go/deps/${p}@${PV}"
          done

          # Commit 2 = the require pins. Tag THIS commit: its go.mod points deps/* at C1.
          git add go.mod
          if git diff --cached --quiet; then
            echo "go.mod require already pinned to $PV"
          else
            git commit -m "engine: pin deps modules @ ${PV} [${TAG}]"
            git push
          fi
          git tag -f "$TAG"
          git push -f origin "$TAG"
          echo "tagged ${TAG} -> $(git rev-parse --short HEAD); deps resolve to ${SH}"

      - name: Create/Update Release with engine packages
        shell: bash
        run: |
          set -euo pipefail
          assets=$(find dist -name 'libv8-*.tar.gz')
          notes="Built V8 ${BUILT_V8} (commit ${V8_HASH}) ${CVER}. Libs committed in-tree at this tag — \`go get\` needs no download. Tarballs below are for non-Go consumers."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $assets --clobber
            gh release edit "$TAG" --title "V8 engine ${BUILT_V8} ${CVER}" --notes "$notes"
          else
            gh release create "$TAG" $assets --title "V8 engine ${BUILT_V8} ${CVER}" --notes "$notes"
          fi
