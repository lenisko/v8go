name: build-engine

# MANUAL: build a V8 engine for a chosen V8 version, publish per-platform libv8
# packages on a GitHub Release, and pin deps/v8_hash in the repo. Input may be a
# V8 commit hash, a Chrome major (e.g. 148), or "latest" (resolved via chromiumdash).
#
# Runners are NATIVE (no emulation): ubuntu = x64 (linux/amd64 native, linux/arm64
# cross — V8 ships only a linux-x64 rust toolchain); macos-latest = arm64 (darwin
# arm64 native), macos-13 = x64 (darwin amd64 native). build.py disables the V8
# sandbox so the newer-V8 libc++-hardening assertion passes with the system C++
# toolchain (cgo.go drops -DV8_ENABLE_SANDBOX to match).

on:
  workflow_dispatch:
    inputs:
      v8:
        description: 'V8 commit hash, or Chrome major (e.g. 148), or "latest"'
        required: true
        default: 'latest'
      release_tag:
        description: 'Release tag (default: engine-chrome<major> or engine-<shorthash>)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      v8_hash: ${{ steps.r.outputs.v8_hash }}
      tag: ${{ steps.r.outputs.tag }}
      chrome_version: ${{ steps.r.outputs.chrome_version }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/resolve-v8.py "${{ github.event.inputs.v8 }}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: amd64, runner: ubuntu-latest }
          - { os: linux,  arch: arm64, runner: ubuntu-latest }
          - { os: darwin, arch: arm64, runner: macos-latest }
          - { os: darwin, arch: amd64, runner: macos-13 }
    runs-on: ${{ matrix.runner }}
    env:
      V8_HASH: ${{ needs.resolve.outputs.v8_hash }}
      ARCH: ${{ matrix.arch }}
      OSID: ${{ matrix.os }}
      PLATFORM: ${{ matrix.os }}_${{ matrix.arch }}
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq --no-install-recommends build-essential python3 git curl ca-certificates ccache pkg-config ninja-build xz-utils

      - name: Toolchain (macos)
        if: runner.os == 'macOS'
        run: brew install ccache ninja || true

      - name: depot_tools + V8 source @ pinned commit
        shell: bash
        run: |
          set -euo pipefail
          export GCLIENT_SUPPRESS_GIT_VERSION_WARNING=1
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git deps/depot_tools
          export PATH="$PWD/deps/depot_tools:$PATH"
          gclient --version >/dev/null 2>&1 || true
          mkdir -p deps/v8
          git -C deps/v8 init -q
          git -C deps/v8 remote add origin https://chromium.googlesource.com/v8/v8.git
          git -C deps/v8 fetch --depth=1 origin "$V8_HASH"
          git -C deps/v8 checkout -q FETCH_HEAD
          echo "$V8_HASH" > deps/v8_hash

      - name: Build V8 (${{ matrix.os }}/${{ matrix.arch }})
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PWD/deps/depot_tools:$PATH"
          export GCLIENT_SUPPRESS_GIT_VERSION_WARNING=1
          cd deps
          python3 ./build.py --ccache --verbose --arch "$ARCH" --os "$OSID"
          python3 ./build_common.py || true
          ls -la "$PLATFORM"/
          grep -h "V8_MAJOR_VERSION\|V8_MINOR_VERSION\|V8_BUILD_NUMBER\|V8_PATCH_LEVEL" include/v8-version.h

      - name: Package engine (libs + headers)
        shell: bash
        run: |
          set -euo pipefail
          out="libv8-${TAG}-${PLATFORM}.tar.gz"
          tar -czf "$out" -C deps "$PLATFORM" include
          shasum -a 256 "$out" || sha256sum "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}_${{ matrix.arch }}
          path: libv8-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
      V8_HASH: ${{ needs.resolve.outputs.v8_hash }}
      CVER: ${{ needs.resolve.outputs.chrome_version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create/Update Release with engine packages
        shell: bash
        run: |
          set -euo pipefail
          assets=$(find dist -name 'libv8-*.tar.gz')
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $assets --clobber
          else
            gh release create "$TAG" $assets \
              --title "V8 engine ${TAG} ${CVER}" \
              --notes "V8 commit ${V8_HASH}. Per-platform libv8 packages (static libs + version-matched headers)."
          fi

      - name: Update repo (pin deps/v8_hash) + push
        shell: bash
        run: |
          set -euo pipefail
          echo "$V8_HASH" > deps/v8_hash
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/v8_hash
          git commit -m "engine: build V8 ${V8_HASH} (${TAG})" || { echo "no change to commit"; exit 0; }
          git push
